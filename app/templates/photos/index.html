{% extends "base.html" %}
{% block title %}photos · DaeHyun Kim{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">

    {# 태그 필터 #}
    {% if all_tags %}
    <div class="flex flex-wrap gap-2">
        <button
            hx-get="/photos/"
            hx-target="#grid"
            hx-push-url="true"
            class="text-xs px-3 py-1 rounded-full border transition
                   {% if not active_tag %}border-neutral-800 text-neutral-800{% else %}border-neutral-200 text-neutral-400 hover:border-neutral-400{% endif %}">
            all
        </button>
        {% for tag in all_tags %}
        <button
            hx-get="/photos/?tag={{ tag }}"
            hx-target="#grid"
            hx-push-url="true"
            class="text-xs px-3 py-1 rounded-full border transition
                   {% if active_tag == tag %}border-neutral-800 text-neutral-800{% else %}border-neutral-200 text-neutral-400 hover:border-neutral-400{% endif %}">
            {{ tag }}
        </button>
        {% endfor %}
    </div>
    {% endif %}

    {# 사진 그리드 #}
    <div id="grid" class="grid grid-cols-2 md:grid-cols-3 gap-2">
        {% include "photos/_grid.html" %}
    </div>

</div>
{% endblock %}
