{% extends "base.html" %}
{% block title %}tools · DaeHyun Kim{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">
    <h1 class="text-sm text-neutral-400 uppercase tracking-widest">Tools</h1>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
        {% for tool in tools %}
        <a href="{{ tool.url }}"
           class="group border border-neutral-200 rounded-lg p-4 flex flex-col gap-2 hover:border-neutral-400 hover:shadow-sm transition">
            <span class="text-sm font-medium text-neutral-700 group-hover:text-neutral-900">{{ tool.name }}</span>
            <span class="text-xs text-neutral-400 leading-relaxed">{{ tool.description }}</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
