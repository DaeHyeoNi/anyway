{% extends "base.html" %}
{% block title %}tools · DaeHyun Kim{% endblock %}

{% block content %}
<div class="flex flex-col gap-6 max-w-xl">
    <h1 class="text-sm text-neutral-400 uppercase tracking-widest">Tools</h1>

    <ul class="flex flex-col divide-y divide-neutral-100">
        {% for tool in tools %}
        <li>
            <a href="{{ tool.url }}"
               class="flex flex-col gap-1 py-4 hover:text-neutral-600 transition group">
                <span class="text-sm font-medium text-neutral-700 group-hover:text-neutral-900">{{ tool.name }}</span>
                <span class="text-xs text-neutral-400">{{ tool.description }}</span>
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
