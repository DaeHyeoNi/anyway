{% extends "base.html" %}
{% block title %}Login · DaeHyun Kim{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-sm flex flex-col gap-6">
        <h1 class="text-lg font-light tracking-tight text-neutral-700">Admin</h1>

        {% if error %}
        <p class="text-sm text-red-500">{{ error }}</p>
        {% endif %}

        <form method="post" action="/manage/login" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <label class="text-xs text-neutral-400 uppercase tracking-wider">ID</label>
                <input
                    type="text"
                    name="admin_id"
                    autocomplete="username"
                    required
                    class="border border-neutral-200 bg-white px-3 py-2 text-sm text-neutral-800 outline-none focus:border-neutral-400 transition rounded"
                >
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-xs text-neutral-400 uppercase tracking-wider">Password</label>
                <input
                    type="password"
                    name="password"
                    autocomplete="current-password"
                    required
                    class="border border-neutral-200 bg-white px-3 py-2 text-sm text-neutral-800 outline-none focus:border-neutral-400 transition rounded"
                >
            </div>

            <button
                type="submit"
                class="mt-2 bg-neutral-800 text-white text-sm py-2 rounded hover:bg-neutral-700 transition"
            >
                로그인
            </button>
        </form>
    </div>
</div>
{% endblock %}
