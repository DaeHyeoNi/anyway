{% extends "base.html" %}
{% block title %}Upload · DaeHyun Kim{% endblock %}

{% block content %}
<div class="flex flex-col gap-8 max-w-lg">
    <div class="flex items-center justify-between">
        <h1 class="text-lg font-light text-neutral-700">사진 업로드</h1>
        <a href="/manage" class="text-xs text-neutral-400 hover:text-neutral-700 transition">← 대시보드</a>
    </div>

    {% if success %}
    <p class="text-sm text-green-600">{{ success }}</p>
    {% endif %}

    {% if error %}
    <p class="text-sm text-red-500 whitespace-pre-line">{{ error }}</p>
    {% endif %}

    <form method="post" action="/manage/photos/upload" enctype="multipart/form-data"
          class="flex flex-col gap-4"
          x-data="{ dragging: false, files: [] }"
          @dragover.prevent="dragging = true"
          @dragleave.prevent="dragging = false"
          @drop.prevent="dragging = false; files = Array.from($event.dataTransfer.files)">

        <label
            class="border-2 border-dashed rounded-lg p-10 text-center cursor-pointer transition"
            :class="dragging ? 'border-neutral-400 bg-neutral-100' : 'border-neutral-200 hover:border-neutral-300'"
        >
            <input type="file" name="files" accept="image/*" multiple class="hidden"
                   @change="files = Array.from($event.target.files)">
            <p class="text-sm text-neutral-400">클릭하거나 이미지를 드래그하세요</p>
            <p class="text-xs text-neutral-300 mt-1">JPG, PNG, WEBP — 다중 선택 가능</p>
            <template x-if="files.length > 0">
                <p class="text-sm text-neutral-600 mt-3" x-text="`${files.length}개 선택됨`"></p>
            </template>
        </label>

        <button
            type="submit"
            class="bg-neutral-800 text-white text-sm py-2 rounded hover:bg-neutral-700 transition"
            :disabled="files.length === 0"
            :class="files.length === 0 ? 'opacity-40 cursor-not-allowed' : ''"
        >
            업로드
        </button>
    </form>
</div>
{% endblock %}
