<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DaeHyun Kim{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-stone-50 text-neutral-800 min-h-screen">
    <nav class="border-b border-neutral-200 px-6 py-4 flex items-center justify-between">
        <a href="/" class="text-sm font-medium tracking-widest uppercase text-neutral-400 hover:text-neutral-800 transition">DaeHyun Kim</a>
        <div class="flex gap-5">
            <a href="/photos/" class="text-sm text-neutral-400 hover:text-neutral-800 transition">photos</a>
            <a href="/photos/map" class="text-sm text-neutral-400 hover:text-neutral-800 transition">map</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
