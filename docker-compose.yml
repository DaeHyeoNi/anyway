services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./storage:/app/storage
      - ./anyway.db:/app/anyway.db

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
